name: alert
description: "ZAlert — MT5 Price Alert App"
publish_to: 'none'
version: 1.1.0+2

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Navigation
  go_router: ^14.2.7

  # HTTP
  dio: ^5.4.3+1

  # State management
  provider: ^6.1.2

  # Local storage
  shared_preferences: ^2.3.2

  # UUID generation
  uuid: ^4.4.0

  # Push notifications (Firebase)
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3
  flutter_local_notifications: ^17.2.2

  # Device info
  device_info_plus: ^10.1.2

  # UI — existing
  flutter_slidable: ^3.1.1
  cached_network_image: ^3.3.1
  flutter_animate: ^4.5.0
  badges: ^3.1.2
  flutter_screenutil: ^5.9.3
  webview_flutter: ^4.10.0
  url_launcher: ^6.3.1
  timezone: ^0.9.4
  flutter_timezone: ^5.1.0

  # UI — new
  shimmer: ^3.0.0          # Skeleton / shimmer loading effects
  fl_chart: ^0.68.0        # Mini sparkline price charts
  connectivity_plus: ^6.0.3 # Offline detection

  # Image & Google Drive
  image_picker: ^1.1.2
  google_sign_in: ^6.2.1
  googleapis: ^13.2.0
  http: ^1.2.2
  path: ^1.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/fonts/

  fonts:
    - family: IranSans
      fonts:
        - asset: assets/fonts/IranSans-Bold.ttf
          weight: 700

    - family: TexGyreAdventor
      fonts:
        - asset: assets/fonts/TexGyreAdventor-Regular.ttf
          weight: 400
        - asset: assets/fonts/TexGyreAdventor-Bold.ttf
          weight: 700
